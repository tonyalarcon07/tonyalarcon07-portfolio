<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Portfolio Alarcon Tony</title>
  <meta name="description" content="Digital CV & Projects — Tony Alarcon (General Engineering, Project Management)." />
  <style>
    :root{
      --bg: #0b1220;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.68);
      --accent: #7aa2ff;
      --accent2:#6ef3c5;
      --steel: #9aa6bd;
      --bronze: #b89662;
      --techline: rgba(232,241,255,.45);
      --shadow: 0 10px 40px rgba(0,0,0,.35);
      --radius: 18px;
      --radius2: 14px;
      --max: 1100px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    [data-theme="light"]{
      --bg: #f5f7ff;
      --panel: rgba(0,0,0,.04);
      --panel2: rgba(0,0,0,.06);
      --border: rgba(0,0,0,.10);
      --text: rgba(0,0,0,.88);
      --muted: rgba(0,0,0,.62);
      --accent: #2f64ff;
      --accent2:#0aa77a;
      --shadow: 0 12px 40px rgba(0,0,0,.10);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height: 100svh;
      font-family: var(--font);
      color: var(--text);
      background-color: var(--bg);
      background:
        radial-gradient(120% 70% at 18% 10%, rgba(120,170,255,.30), transparent 62%),
        radial-gradient(110% 68% at 82% 16%, rgba(165,130,255,.26), transparent 62%),
        linear-gradient(140deg, #0b1220 0%, #2f64ff 42%, #8467ff 74%, #0b1220 100%);
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
      position: relative;
      overflow-x: hidden;
    }
    #starfield{
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      overflow: hidden;
    }
    .star{
      position: absolute;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 0 8px rgba(255,255,255,.45);
      animation: twinkle var(--twinkle, 7s) ease-in-out infinite;
    }
    .star.big{box-shadow: 0 0 14px rgba(190,215,255,.65)}
    @keyframes twinkle{
      0%,100%{opacity:.18; transform: scale(.85)}
      50%{opacity:1; transform: scale(1.18)}
    }
    body::before,
    body::after{
      content:"";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    body::before{
      z-index: -2;
      opacity: .9;
      background:
        radial-gradient(340px 340px at 85% 20%, rgba(86,104,255,.48), rgba(42,40,95,.2) 60%, transparent 74%),
        radial-gradient(240px 240px at 18% 76%, rgba(168,116,255,.42), rgba(76,38,120,.16) 58%, transparent 74%),
        radial-gradient(900px 560px at 50% 110%, rgba(70,95,210,.16), transparent 70%);
    }
    body::after{
      z-index: -1;
      opacity: .5;
      background:
        radial-gradient(150px 150px at 87% 19%, rgba(230,238,255,.25), transparent 72%),
        radial-gradient(120px 120px at 20% 75%, rgba(255,224,255,.2), transparent 72%);
    }
    a{color:inherit}
    .wrap{max-width:var(--max); margin:0 auto; padding:26px 16px 70px; position:relative; z-index:1;}
    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:14px 14px;
      border:1px solid var(--border);
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: sticky; top: 10px; z-index: 10;
      backdrop-filter: blur(10px);
    }
    .brand{
      display:flex; align-items:center; gap:12px; min-width: 240px;
    }
    .avatar{
      width:42px; height:42px; border-radius:14px;
      background: linear-gradient(135deg, rgba(122,162,255,.8), rgba(110,243,197,.7));
      display:grid; place-items:center;
      font-weight:800; color: rgba(0,0,0,.75);
      box-shadow: 0 12px 30px rgba(0,0,0,.20);
      user-select:none;
    }
    .brand .name{font-weight:800; letter-spacing:.2px}
    .brand .role{font-size:12px; color: var(--muted); margin-top:2px}
    .actions{display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end}
    .btn{
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding:10px 12px;
      border-radius: 14px;
      text-decoration:none;
      display:inline-flex; align-items:center; gap:8px;
      cursor:pointer;
      transition: transform .08s ease, background .2s ease, border-color .2s ease;
      user-select:none;
    }
    .btn:hover{transform: translateY(-1px); background: rgba(255,255,255,.07); border-color: rgba(122,162,255,.35)}
    .btn.primary{
      border-color: rgba(122,162,255,.45);
      background: rgba(122,162,255,.12);
    }
    .btn.small{padding:9px 10px; border-radius: 12px; font-size: 13px}
    .grid{
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap:16px;
      margin-top:16px;
    }
    @media (max-width: 980px){
      .grid{grid-template-columns: 1fr}
      .brand{min-width:auto}
    }
    .card{
      border:1px solid var(--border);
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:16px;
    }
    .card h2{
      margin:0 0 10px;
      font-size: 14px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .hero{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .headline{
      display:flex;
      gap:12px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .headline h1{
      margin:0;
      font-size: 34px;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px}
    .chip{
      border:1px solid var(--border);
      background: rgba(255,255,255,.05);
      padding:7px 10px;
      border-radius: 999px;
      font-size: 12.5px;
      color: var(--muted);
    }
    .chip strong{color: var(--text); font-weight: 700}
    .summary{
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
      margin: 0;
    }

    .nav{margin-top:12px; position:relative; min-height:380px}
    .space-hint{
      text-align:center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom:10px;
      opacity:.88;
      letter-spacing:.01em;
    }
    .space-hint strong{color: var(--text); font-weight:600}
    .space-stage{position:relative; border:1px solid var(--border); border-radius: var(--radius2); background: rgba(8,12,28,.32); overflow:hidden}
    .space-stage::before,
    .space-stage::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:0;
    }
    .space-stage::before{
      opacity:.22;
      background:
        linear-gradient(90deg, rgba(154,166,189,.16) 1px, transparent 1px),
        linear-gradient(0deg, rgba(154,166,189,.14) 1px, transparent 1px);
      background-size: 26px 26px;
      mix-blend-mode: screen;
    }
    .space-stage::after{
      opacity:.55;
      background: radial-gradient(72% 72% at 50% 50%, transparent 58%, rgba(5,8,20,.45) 100%);
    }
    #space{
      width:100%;
      height:370px;
      display:block;
      position:relative;
      z-index:1;
      background: radial-gradient(70% 70% at 50% 48%, rgba(16,20,42,.48), rgba(8,12,26,.12) 56%, transparent 90%);
    }
    .orbit{fill:none; stroke: rgba(236,244,255,.32); stroke-width:1.15; stroke-dasharray: 2 3.2}
    .orbit.tech-orbit{stroke: rgba(184,202,232,.42); stroke-width:1; stroke-dasharray: 5 6; animation: orbit-slide 26s linear infinite}
    .orbit.tech-orbit.watch{stroke: rgba(214,184,140,.42); stroke-dasharray: 2.2 4.8; animation-duration: 32s}
    @keyframes orbit-slide{to{stroke-dashoffset:-320}}
    .sun{filter: drop-shadow(0 0 14px rgba(255,204,85,.4));}
    .sun-body{filter: drop-shadow(0 0 24px rgba(255,186,70,.72)) drop-shadow(0 0 40px rgba(255,120,40,.45));}
    .sun .sun-core{animation: sun-spin 18s linear infinite; transform-origin:center; transform-box: fill-box}
    .sun .sun-plasma{animation: sun-plasma 9.5s ease-in-out infinite; transform-origin:center; transform-box: fill-box}
    .sun .sun-noise{animation: sun-spin-rev 26s linear infinite; transform-origin:center; transform-box: fill-box; mix-blend-mode: screen}
    .sun .sun-rim{mix-blend-mode: screen; opacity:.78}
    .sun .sun-corona{mix-blend-mode: screen; animation: sun-corona 3.8s ease-in-out infinite}
    @keyframes sun-spin{to{transform: rotate(360deg)}}
    @keyframes sun-spin-rev{to{transform: rotate(-360deg)}}
    @keyframes sun-plasma{0%,100%{transform:scale(1);opacity:.62}50%{transform:scale(1.06);opacity:.92}}
    @keyframes sun-corona{0%,100%{opacity:.32; transform:scale(1)}50%{opacity:.62; transform:scale(1.1)}}
    .planet{cursor:pointer; transition: opacity .2s ease, transform .25s ease, filter .25s ease}
    .planet[aria-selected="true"]{opacity:1}
    .planet[aria-selected="false"]{opacity:.84}
    .planet:hover{filter: drop-shadow(0 0 12px rgba(255,255,255,.28)); opacity:1}
    .planet-label{font-size:10px; fill: rgba(255,255,255,.86); pointer-events:none}
    .planet.rotate circle{animation: planet-spin-svg .9s linear; transform-origin:center; transform-box: fill-box}
    @keyframes planet-spin-svg{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .planet .micro-orbit{fill:none; stroke-width:.7; opacity:.6; animation: micro-drift 18s linear infinite; transform-origin:center; transform-box: fill-box}
    .planet .micro-orbit.astro{stroke: rgba(222,236,255,.44); stroke-dasharray: 1.1 3.2}
    .planet .micro-orbit.mech{stroke: rgba(165,178,201,.42); stroke-dasharray: 2.4 2.8}
    .planet .micro-orbit.watch{stroke: rgba(195,161,112,.5); stroke-dasharray: 1.6 2.3}
    @keyframes micro-drift{to{transform: rotate(360deg)}}
    .planet .texture{pointer-events:none; opacity:.2; mix-blend-mode: screen}
    .planet .texture.astro{opacity:.24}
    .planet .texture.mech{opacity:.18}
    .planet .texture.watch{opacity:.22}
    .planet .texture.spin-slow{animation: texture-spin 42s linear infinite; transform-origin:center; transform-box: fill-box}
    .planet .texture.spin-rev{animation: texture-spin-rev 54s linear infinite; transform-origin:center; transform-box: fill-box}
    .planet:hover .texture{opacity:.34}
    @keyframes texture-spin{to{transform: rotate(360deg)}}
    @keyframes texture-spin-rev{to{transform: rotate(-360deg)}}
    .planet .matter{pointer-events:none; mix-blend-mode: screen}
    .planet .matter.band{fill:none; stroke-linecap:round; opacity:.52}
    .planet .matter.band.soft{opacity:.34}
    .planet .matter.watch{stroke: rgba(220,190,138,.55)}
    .planet .matter.mech{stroke: rgba(176,192,222,.50)}
    .planet .matter.astro{stroke: rgba(198,226,255,.52)}
    .planet .matter.spot{opacity:.22}
    .planet .planet-core{transform-origin:center; transform-box: fill-box; animation: self-rotate 24s linear infinite}
    .planet.astro .planet-core{animation-duration: 30s}
    .planet.mech .planet-core{animation-duration: 20s}
    .planet.watch .planet-core{animation-duration: 24s}
    .planet:nth-of-type(even) .planet-core{animation-direction: reverse}
    @keyframes self-rotate{to{transform: rotate(360deg)}}
    .planet-tracker{opacity:0; pointer-events:none; transition: opacity .25s ease}
    .planet-tracker.active{opacity:1}
    .planet-tracker .ring{fill:none; stroke: rgba(225,238,255,.78); stroke-width:.8; stroke-dasharray: 3 4}
    .planet-tracker .ring.outer{stroke: rgba(186,206,236,.52); animation: tracker-spin 7s linear infinite}
    .planet-tracker .ring.inner{stroke: rgba(240,210,160,.62); animation: tracker-spin-rev 5.8s linear infinite}
    .planet-tracker .cross{stroke: rgba(236,244,255,.68); stroke-width:.7; stroke-linecap:round}
    .planet-tracker .tag{font-size:8px; fill: rgba(230,240,255,.92); letter-spacing:.05em}
    @keyframes tracker-spin{to{transform: rotate(360deg)}}
    @keyframes tracker-spin-rev{to{transform: rotate(-360deg)}}

    #planetPanel{
      background: rgba(10,12,24,.82);
      backdrop-filter: blur(10px);
      border:1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 14px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height .45s ease, opacity .4s ease, padding .4s ease;
    }
    #planetPanel.open{
      max-height: 800px;
      overflow-y: auto;
      opacity: 1;
      padding: 14px;
    }
    #planetPanelTop{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap}
    #planetCrumb{
      display:inline-block;
      padding:6px 10px;
      border:1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size:12px;
      margin-right:8px;
    }
    #planetTitle{font-weight:800}

    .panel{display:none}
    .panel.active{display:none}

    .list{display:flex; flex-direction:column; gap:10px}
    .item{
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius: var(--radius2);
      padding:12px;
    }
    .item .top{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap}
    .item .title{font-weight:800}
    .item .meta{color: var(--muted); font-size: 13px}
    .item ul{margin:8px 0 0; padding-left:18px; color: var(--muted); line-height: 1.55}
    .item p{margin:8px 0 0; color: var(--muted); line-height: 1.55}
    .pillrow{margin-top:8px; display:flex; flex-wrap:wrap; gap:8px}
    .pill{
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 12.5px;
    }
    .kpi{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:10px;
    }
    @media (max-width: 640px){
      .kpi{grid-template-columns: 1fr}
    }
    .kpi .box{
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius: var(--radius2);
      padding:12px;
    }
    .kpi .box .big{font-weight:900; font-size: 16px}
    .kpi .box .small{color: var(--muted); font-size: 12.5px; margin-top:4px}
    .footer{
      margin-top: 16px;
      text-align:center;
      color: var(--muted);
      font-size: 13px;
    }

    /* Print */
    @media print{
      .topbar, .nav, .actions { display:none !important; }
      body{ background: #fff !important; color:#111 !important; }
      .card, .item, .box{ box-shadow:none !important; }
      a{ text-decoration:none !important; color:#111 !important;}
    }
  </style>
</head>

        { label: "Email", value: "tony.alarcon07@gmail.com", href: "mailto:tony.alarcon07@gmail.com" },
        { label: "Phone", value: "+33 6 95 22 66 53", href: "tel:+33695226653" },
        { label: "Location", value: "Lavoulte-sur-Rhône, France" },
        { label: "LinkedIn", value: "tony-alarcon-svg", href: "https://www.linkedin.com/in/tony-alarcon-svg" }
      ]
    };

    // =========================
    // Render
    // =========================
    const $ = (id) => document.getElementById(id);

    function setText(id, text){ $(id).textContent = text; }
    function el(tag, cls){ const e = document.createElement(tag); if(cls) e.className = cls; return e; }

    function render(){
      setText("topName", DATA.name);
      setText("topRole", DATA.role);
      setText("name", DATA.name);

      const initials = DATA.name.split(" ").slice(0,2).map(s => s[0]?.toUpperCase()).join("");
      $("avatar").textContent = initials || "CV";

      // top buttons
      $("btnEmail").href = `mailto:${DATA.email}`;
      $("btnLinkedIn").href = DATA.linkedin;
      $("btnCV").href = DATA.cvPdfUrl;

      // chips
      const chips = $("chips");
      chips.innerHTML = "";
      DATA.chips.forEach(c => {
        const chip = el("div","chip");
        chip.innerHTML = `<strong>${c.label}:</strong> ${c.value}`;
        chips.appendChild(chip);
      });

      // summary
      $("summary").textContent = DATA.summary;

      // KPIs
      const kpis = $("kpis");
      kpis.innerHTML = "";
      DATA.kpis.forEach(k => {
        const box = el("div","box");
        box.innerHTML = `<div class="big">${k.big}</div><div class="small">${k.small}</div>`;
        kpis.appendChild(box);
      });

      // profile blocks
      const pb = $("profileBlocks");
      pb.innerHTML = "";
      DATA.profileBlocks.forEach(b => {
        const item = el("div","item");
        const top = el("div","top");
        top.innerHTML = `<div class="title">${b.title}</div>`;
        item.appendChild(top);
        if(b.text){
          const p = el("p"); p.textContent = b.text; item.appendChild(p);
        }
        if(b.bullets?.length){
          const ul = el("ul");
          b.bullets.forEach(x => { const li=el("li"); li.textContent=x; ul.appendChild(li); });
          item.appendChild(ul);
        }
        pb.appendChild(item);
      });

      // experience
      const exp = $("experienceList"); exp.innerHTML = "";
      DATA.experience.forEach(e => exp.appendChild(renderEntry(e)));

      // projects
      const pr = $("projectsList"); pr.innerHTML = "";
      DATA.projects.forEach(p => {
        const item = el("div","item");
        item.innerHTML = `
          <div class="top">
            <div class="title">${p.title}</div>
            <div class="meta">${p.meta || ""}</div>
          </div>
          <p>${p.text || ""}</p>
        `;
        pr.appendChild(item);
      });

      // education
      const ed = $("educationList"); ed.innerHTML = "";
      DATA.education.forEach(e => ed.appendChild(renderEntry(e)));

      // skills
      const sk = $("skillsList"); sk.innerHTML = "";
      DATA.skills.forEach(s => {
        const item = el("div","item");
        item.innerHTML = `
          <div class="top">
            <div class="title">${s.title}</div>
            <div class="meta"></div>
          </div>
        `;
        const row = el("div","pillrow");
        (s.pills || []).forEach(p => {
          const pill = el("div","pill"); pill.textContent = p; row.appendChild(pill);
        });
        item.appendChild(row);
        sk.appendChild(item);
      });

      // languages
      const lg = $("languagesList"); lg.innerHTML = "";
      DATA.languages.forEach(l => lg.appendChild(renderEntry({title:l.title, meta:l.meta})));

      // interests
      const it = $("interestsList"); it.innerHTML = "";
      const item = el("div","item");
      item.innerHTML = `<div class="top"><div class="title">Interests</div><div class="meta"></div></div>`;
      const row = el("div","pillrow");
      DATA.interests.forEach(x => { const pill = el("div","pill"); pill.textContent = x; row.appendChild(pill); });
      item.appendChild(row);
      it.appendChild(item);

      // contact
      const ct = $("contactList"); ct.innerHTML = "";
      DATA.contact.forEach(c => {
        const item = el("div","item");
        const value = c.href ? `<a href="${c.href}" target="${c.href.startsWith("http") ? "_blank" : ""}" rel="noreferrer">${c.value}</a>` : c.value;
        item.innerHTML = `<div class="top"><div class="title">${c.label}</div><div class="meta">${value}</div></div>`;
        ct.appendChild(item);
      });

      // sidebar quick info
      const sb = $("sidebar"); sb.innerHTML = "";
      [
        {label:"Location", value: DATA.location},
        {label:"Email", value: DATA.email, href:`mailto:${DATA.email}`},
        {label:"Phone", value: DATA.phone, href:`tel:${DATA.phone.replace(/\s+/g,"")}`},
      ].forEach(x => {
        const item = el("div","item");
        item.innerHTML = `<div class="top"><div class="title">${x.label}</div><div class="meta">${x.href ? `<a href="${x.href}">${x.value}</a>` : x.value}</div></div>`;
        sb.appendChild(item);
      });

      $("footer").textContent = `© ${new Date().getFullYear()} ${DATA.name}`;
    }

    function renderEntry(e){
      const item = el("div","item");
      item.innerHTML = `
        <div class="top">
          <div class="title">${e.title}</div>
          <div class="meta">${e.meta || ""}</div>
        </div>
        ${e.text ? `<p>${e.text}</p>` : ""}
      `;
      if(e.bullets?.length){
        const ul = el("ul");
        e.bullets.forEach(b => { const li=el("li"); li.textContent=b; ul.appendChild(li); });
        item.appendChild(ul);
      }
      return item;
    }

    // Solar tabs
    const planets = Array.from(document.querySelectorAll(".planet"));
    const panels = Array.from(document.querySelectorAll(".panel"));
    const space = $("space");
    const planetPanel = $("planetPanel");
    const planetCrumb = $("planetCrumb");
    const planetTitle = $("planetTitle");
    const planetContent = $("planetContent");
    const planetBack = $("planetBack");
    const planetTracker = $("planetTracker");
    const trackerTag = $("trackerTag");
    const starfield = $("starfield");
    const DEFAULT_VB = space.getAttribute("viewBox") || "-120 -120 240 240";
    const orbitMotions = [];
    const orbitRadiusMap = {
      skills: 28,
      languages: 36,
      interests: 45,
      contact: 54,
      education: 64,
      profile: 73,
      projects: 82,
      experience: 90,
    };
    const orbitChaosMap = {
      skills: { eccentricity: .03, tiltDeg: -4, phaseDeg: 18 },
      languages: { eccentricity: .04, tiltDeg: 7, phaseDeg: 72 },
      interests: { eccentricity: .05, tiltDeg: -9, phaseDeg: 132 },
      contact: { eccentricity: .04, tiltDeg: 11, phaseDeg: 196 },
      education: { eccentricity: .06, tiltDeg: -6, phaseDeg: 245 },
      profile: { eccentricity: .05, tiltDeg: 4, phaseDeg: 288 },
      projects: { eccentricity: .06, tiltDeg: -12, phaseDeg: 330 },
      experience: { eccentricity: .07, tiltDeg: 9, phaseDeg: 20 },
    };
    let orbitFrame = null;
    let orbitLastTs = 0;
    let followFrame = null;
    let followedPlanet = null;
    let followStartTs = 0;

    function parseViewBox(vb){
      const parts = (vb || "").split(/\s+/).map(Number);
      if(parts.length === 4 && parts.every(Number.isFinite)) return parts;
      return DEFAULT_VB.split(/\s+/).map(Number);
    }

    function getPlanetCenter(node){
      const tm = (node?.getAttribute("transform") || "").match(/translate\(([-\d.]+),\s*([-\d.]+)\)/);
      if(tm){
        const x = Number(tm[1]);
        const y = Number(tm[2]);
        if(Number.isFinite(x) && Number.isFinite(y)){
          return { x, y };
        }
      }

      const box = node.getBBox();
      return {
        x: box.x + box.width / 2,
        y: box.y + box.height / 2,
      };
    }

    function getPlanetViewBox(node){
      const center = getPlanetCenter(node);
      const requestedSize = Number(node?.dataset?.zoom);
      const minSize = 56;
      const fallbackSize = 74;
      const size = Number.isFinite(requestedSize) ? Math.max(minSize, requestedSize) : fallbackSize;

      return `${(center.x - size / 2).toFixed(2)} ${(center.y - size / 2).toFixed(2)} ${size.toFixed(2)} ${size.toFixed(2)}`;
    }

    function getPlanetSpinSpec(node){
      const core = node.querySelector(".planet-core");
      if(!core) return { duration: 24, direction: 1 };

      const style = window.getComputedStyle(core);
      const rawDuration = (style.animationDuration || "24s").split(",")[0].trim();
      const rawDirection = (style.animationDirection || "normal").split(",")[0].trim();
      let duration = 24;

      if(rawDuration.endsWith("ms")){
        const ms = Number(rawDuration.replace("ms", ""));
        if(Number.isFinite(ms) && ms > 0) duration = ms / 1000;
      } else if(rawDuration.endsWith("s")){
        const sec = Number(rawDuration.replace("s", ""));
        if(Number.isFinite(sec) && sec > 0) duration = sec;
      }

      const direction = rawDirection === "reverse" ? -1 : 1;
      return { duration, direction };
    }

    function getTargetViewBox(node){
      const vb = (node.dataset.vb || "").trim();
      const parts = vb.split(/\s+/).map(Number);
      if(parts.length === 4 && parts.every(n => Number.isFinite(n))){
        return vb;
      }
      return getPlanetViewBox(node);
    }

    function buildStarfield(count = 280){
      if(!starfield) return;
      starfield.innerHTML = "";
      const frag = document.createDocumentFragment();

      for(let i = 0; i < count; i++){
        const star = document.createElement("span");
        star.className = Math.random() > .9 ? "star big" : "star";

        const size = (Math.random() * 2 + .5).toFixed(2);
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${(Math.random() * 100).toFixed(2)}%`;
        star.style.top = `${(Math.random() * 100).toFixed(2)}%`;
        star.style.opacity = (Math.random() * .75 + .2).toFixed(2);
        star.style.setProperty("--twinkle", `${(Math.random() * 8 + 4).toFixed(2)}s`);
        star.style.animationDelay = `${(Math.random() * 10).toFixed(2)}s`;

        frag.appendChild(star);
      }

      starfield.appendChild(frag);
    }

    function setupPlanetOrbits(){
      orbitMotions.length = 0;

      planets.forEach((node, index) => {
        const t = node.getAttribute("transform") || "";
        const m = t.match(/translate\(([-\d.]+),\s*([-\d.]+)\)/);
        if(!m) return;

        const x = Number(m[1]);
        const y = Number(m[2]);
        if(!Number.isFinite(x) || !Number.isFinite(y)) return;

        const baseRadius = Math.hypot(x, y);
        const angle = Math.atan2(y, x);
        const target = node.dataset.target || "";
        const mappedRadius = Number.isFinite(orbitRadiusMap[target]) ? orbitRadiusMap[target] : baseRadius;
        const radius = Math.min(86, Math.max(24, mappedRadius));
        const chaos = orbitChaosMap[target] || { eccentricity: .04, tiltDeg: 0, phaseDeg: 0 };
        const eccentricity = Math.min(.09, Math.max(.02, chaos.eccentricity));
        const tilt = (chaos.tiltDeg || 0) * (Math.PI / 180);
        const phase = (chaos.phaseDeg || 0) * (Math.PI / 180);
        const radiusX = radius * (1 + eccentricity);
        const radiusY = radius * (1 - eccentricity);
        const periodSeconds = 24 + Math.pow(Math.max(radius, 10) / 30, 1.3) * 10;
        const angularSpeed = Math.PI * 2 / periodSeconds;

        orbitMotions.push({ node, angle: angle + phase, angularSpeed, radiusX, radiusY, tilt });
      });
    }

    function animatePlanetOrbits(ts){
      if(!orbitMotions.length){
        orbitFrame = requestAnimationFrame(animatePlanetOrbits);
        return;
      }

      if(!orbitLastTs) orbitLastTs = ts;
      const dt = Math.min(0.05, (ts - orbitLastTs) / 1000);
      orbitLastTs = ts;

      orbitMotions.forEach((motion) => {
        motion.angle += motion.angularSpeed * dt;
        const localX = Math.cos(motion.angle) * motion.radiusX;
        const localY = Math.sin(motion.angle) * motion.radiusY;
        const x = localX * Math.cos(motion.tilt) - localY * Math.sin(motion.tilt);
        const y = localX * Math.sin(motion.tilt) + localY * Math.cos(motion.tilt);
        motion.node.setAttribute("transform", `translate(${x.toFixed(2)},${y.toFixed(2)})`);
      });

      orbitFrame = requestAnimationFrame(animatePlanetOrbits);
    }

    function stopPlanetFollow(){
      if(planetTracker) planetTracker.classList.remove("active");
      if(followFrame){
        cancelAnimationFrame(followFrame);
        followFrame = null;
      }
    }

    function startPlanetFollow(node){
      followedPlanet = node;
      stopPlanetFollow();
      followStartTs = performance.now();
      if(planetTracker){
        planetTracker.classList.add("active");
      }
      if(trackerTag){
        trackerTag.textContent = "";
      }

      function tick(ts){
        if(!followedPlanet || !planetPanel.classList.contains("open")){
          stopPlanetFollow();
          return;
        }

        const center = getPlanetCenter(followedPlanet);
        if(planetTracker){
          planetTracker.setAttribute("transform", `translate(${center.x.toFixed(2)},${center.y.toFixed(2)})`);
        }

        const spin = getPlanetSpinSpec(followedPlanet);
        const elapsed = Math.max(0, ((ts || performance.now()) - followStartTs) / 1000);
        const angle = elapsed / spin.duration * Math.PI * 2 * spin.direction;
        const orbitRadius = 9;
        const camX = center.x + Math.cos(angle) * orbitRadius;
        const camY = center.y + Math.sin(angle) * orbitRadius;
        const trackedSize = parseViewBox(getPlanetViewBox(followedPlanet))[2];
        const targetView = `${(camX - trackedSize / 2).toFixed(2)} ${(camY - trackedSize / 2).toFixed(2)} ${trackedSize.toFixed(2)} ${trackedSize.toFixed(2)}`;

        const [cx, cy, cw, ch] = parseViewBox(space.getAttribute("viewBox") || DEFAULT_VB);
        const [tx, ty, tw, th] = parseViewBox(targetView);
        const ease = 0.2;
        const nx = cx + (tx - cx) * ease;
        const ny = cy + (ty - cy) * ease;
        const nw = cw + (tw - cw) * ease;
        const nh = ch + (th - ch) * ease;

        space.setAttribute("viewBox", `${nx} ${ny} ${nw} ${nh}`);
        followFrame = requestAnimationFrame(tick);
      }

      followFrame = requestAnimationFrame(tick);
    }

    function activate(id){
      planets.forEach(p => p.setAttribute("aria-selected", String(p.dataset.target === id)));
      panels.forEach(p => p.classList.toggle("active", p.id === id));
    }

    function animateViewBox(from, to, ms = 700){
      const [fx, fy, fw, fh] = from.split(" ").map(Number);
      const [tx, ty, tw, th] = to.split(" ").map(Number);
      const t0 = performance.now();

      function tick(t){
        const p = Math.min(1, (t - t0) / ms);
        const e = p < .5 ? 4*p*p*p : 1 - Math.pow(-2*p + 2, 3) / 2;

        const x = fx + (tx - fx) * e;
        const y = fy + (ty - fy) * e;
        const w = fw + (tw - fw) * e;
        const h = fh + (th - fh) * e;

        space.setAttribute("viewBox", `${x} ${y} ${w} ${h}`);
        if(p < 1) requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }

    function openPlanet(node){
      const id = node.dataset.target;
      const targetPanel = document.getElementById(id);
      if(!targetPanel) return;
      followedPlanet = node;
      stopPlanetFollow();

      node.classList.remove("rotate");
      void node.getBoundingClientRect().width;
      node.classList.add("rotate");
      setTimeout(() => node.classList.remove("rotate"), 920);

      animateViewBox(space.getAttribute("viewBox") || DEFAULT_VB, getTargetViewBox(node), 850);
      activate(id);

      setTimeout(() => {
        planetCrumb.textContent = "Section";
        planetTitle.textContent = node.dataset.title || id;
        planetContent.innerHTML = targetPanel.innerHTML;
        planetPanel.classList.add("open");
        history.replaceState({ section: id }, "", `#${id}`);
        startPlanetFollow(node);
      }, 480);
    }

    function closePlanet(){
      followedPlanet = null;
      stopPlanetFollow();
      planetPanel.classList.remove("open");
      animateViewBox(space.getAttribute("viewBox") || DEFAULT_VB, DEFAULT_VB, 650);
      history.replaceState({}, "", "#");
    }

    space.addEventListener("click", (e) => {
      const node = e.target.closest(".planet");
      if(node){
        openPlanet(node);
      } else if(planetPanel.classList.contains("open")){
        closePlanet();
      }
    });

    planets.forEach(node => {
      node.addEventListener("keydown", (e) => {
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          openPlanet(node);
        }
      });
    });

    planetBack.addEventListener("click", closePlanet);

    // Print
    $("btnPrint").addEventListener("click", () => window.print());

    // Init
    // always use dark theme (default colors already set in CSS)
    render();
    buildStarfield();
    setupPlanetOrbits();
    if(orbitFrame) cancelAnimationFrame(orbitFrame);
    orbitLastTs = 0;
    orbitFrame = requestAnimationFrame(animatePlanetOrbits);

    let starResizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(starResizeTimer);
      starResizeTimer = setTimeout(() => buildStarfield(280), 180);
    });

    const hash = (location.hash || "").replace("#", "");
    if(hash){
      const node = planets.find(p => p.dataset.target === hash);
      if(node) openPlanet(node);
    }
  </script>
