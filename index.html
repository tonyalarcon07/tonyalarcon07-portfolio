<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Portfolio Alarcon Tony</title>
  <meta name="description" content="Digital CV & Projects — Tony Alarcon (General Engineering, Project Management)." />
  <style>
    :root{
      --bg: #0b1220;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.68);
      --accent: #7aa2ff;
      --accent2:#6ef3c5;
      --shadow: 0 10px 40px rgba(0,0,0,.35);
      --radius: 18px;
      --radius2: 14px;
      --max: 1100px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    [data-theme="light"]{
      --bg: #f5f7ff;
      --panel: rgba(0,0,0,.04);
      --panel2: rgba(0,0,0,.06);
      --border: rgba(0,0,0,.10);
      --text: rgba(0,0,0,.88);
      --muted: rgba(0,0,0,.62);
      --accent: #2f64ff;
      --accent2:#0aa77a;
      --shadow: 0 12px 40px rgba(0,0,0,.10);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height: 100svh;
      font-family: var(--font);
      color: var(--text);
      background-color: var(--bg);
      background:
        radial-gradient(120% 70% at 18% 10%, rgba(120,170,255,.30), transparent 62%),
        radial-gradient(110% 68% at 82% 16%, rgba(165,130,255,.26), transparent 62%),
        linear-gradient(140deg, #0b1220 0%, #2f64ff 42%, #8467ff 74%, #0b1220 100%);
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
      position: relative;
      overflow-x: hidden;
    }
    #starfield{
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      overflow: hidden;
    }
    .star{
      position: absolute;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 0 8px rgba(255,255,255,.45);
      animation: twinkle var(--twinkle, 7s) ease-in-out infinite;
    }
    .star.big{box-shadow: 0 0 14px rgba(190,215,255,.65)}
    @keyframes twinkle{
      0%,100%{opacity:.18; transform: scale(.85)}
      50%{opacity:1; transform: scale(1.18)}
    }
    body::before,
    body::after{
      content:"";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    body::before{
      z-index: -2;
      opacity: .9;
      background:
        radial-gradient(340px 340px at 85% 20%, rgba(86,104,255,.48), rgba(42,40,95,.2) 60%, transparent 74%),
        radial-gradient(240px 240px at 18% 76%, rgba(168,116,255,.42), rgba(76,38,120,.16) 58%, transparent 74%),
        radial-gradient(900px 560px at 50% 110%, rgba(70,95,210,.16), transparent 70%);
    }
    body::after{
      z-index: -1;
      opacity: .5;
      background:
        radial-gradient(150px 150px at 87% 19%, rgba(230,238,255,.25), transparent 72%),
        radial-gradient(120px 120px at 20% 75%, rgba(255,224,255,.2), transparent 72%);
    }
    a{color:inherit}
    .wrap{max-width:var(--max); margin:0 auto; padding:26px 16px 70px; position:relative; z-index:1;}
    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:14px 14px;
      border:1px solid var(--border);
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: sticky; top: 10px; z-index: 10;
      backdrop-filter: blur(10px);
    }
    .brand{
      display:flex; align-items:center; gap:12px; min-width: 240px;
    }
    .avatar{
      width:42px; height:42px; border-radius:14px;
      background: linear-gradient(135deg, rgba(122,162,255,.8), rgba(110,243,197,.7));
      display:grid; place-items:center;
      font-weight:800; color: rgba(0,0,0,.75);
      box-shadow: 0 12px 30px rgba(0,0,0,.20);
      user-select:none;
    }
    .brand .name{font-weight:800; letter-spacing:.2px}
    .brand .role{font-size:12px; color: var(--muted); margin-top:2px}
    .actions{display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end}
    .btn{
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding:10px 12px;
      border-radius: 14px;
      text-decoration:none;
      display:inline-flex; align-items:center; gap:8px;
      cursor:pointer;
      transition: transform .08s ease, background .2s ease, border-color .2s ease;
      user-select:none;
    }
    .btn:hover{transform: translateY(-1px); background: rgba(255,255,255,.07); border-color: rgba(122,162,255,.35)}
    .btn.primary{
      border-color: rgba(122,162,255,.45);
      background: rgba(122,162,255,.12);
    }
    .btn.small{padding:9px 10px; border-radius: 12px; font-size: 13px}
    .grid{
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap:16px;
      margin-top:16px;
    }
    @media (max-width: 980px){
      .grid{grid-template-columns: 1fr}
      .brand{min-width:auto}
    }
    .card{
      border:1px solid var(--border);
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:16px;
    }
    .card h2{
      margin:0 0 10px;
      font-size: 14px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .hero{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .headline{
      display:flex;
      gap:12px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .headline h1{
      margin:0;
      font-size: 34px;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px}
    .chip{
      border:1px solid var(--border);
      background: rgba(255,255,255,.05);
      padding:7px 10px;
      border-radius: 999px;
      font-size: 12.5px;
      color: var(--muted);
    }
    .chip strong{color: var(--text); font-weight: 700}
    .summary{
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
      margin: 0;
    }

    .nav{margin-top:12px; position:relative; min-height:380px}
    .space-hint{
      text-align:center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom:10px;
      opacity:.88;
      letter-spacing:.01em;
    }
    .space-hint strong{color: var(--text); font-weight:600}
    .space-stage{position:relative; border:1px solid var(--border); border-radius: var(--radius2); background: rgba(8,12,28,.32); overflow:hidden}
    #space{width:100%; height:370px; display:block}
    .orbit{fill:none; stroke: rgba(255,255,255,.09)}
    .sun{filter: drop-shadow(0 0 14px rgba(255,204,85,.4));}
    .planet{cursor:pointer; transition: opacity .2s ease}
    .planet[aria-selected="true"]{opacity:1}
    .planet[aria-selected="false"]{opacity:.84}
    .planet:hover{filter: drop-shadow(0 0 12px rgba(255,255,255,.28)); opacity:1}
    .planet-label{font-size:10px; fill: rgba(255,255,255,.86); pointer-events:none}
    .planet.rotate circle{animation: planet-spin-svg .9s linear; transform-origin:center; transform-box: fill-box}
    @keyframes planet-spin-svg{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

    #planetPanel{
      background: rgba(10,12,24,.82);
      backdrop-filter: blur(10px);
      border:1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 14px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height .45s ease, opacity .4s ease, padding .4s ease;
    }
    #planetPanel.open{
      max-height: 800px;
      opacity: 1;
      padding: 14px;
    }
    #planetPanelTop{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap}
    #planetCrumb{
      display:inline-block;
      padding:6px 10px;
      border:1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size:12px;
      margin-right:8px;
    }
    #planetTitle{font-weight:800}

    .panel{display:none}
    .panel.active{display:none}

    .list{display:flex; flex-direction:column; gap:10px}
    .item{
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius: var(--radius2);
      padding:12px;
    }
    .item .top{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap}
    .item .title{font-weight:800}
    .item .meta{color: var(--muted); font-size: 13px}
    .item ul{margin:8px 0 0; padding-left:18px; color: var(--muted); line-height: 1.55}
    .item p{margin:8px 0 0; color: var(--muted); line-height: 1.55}
    .pillrow{margin-top:8px; display:flex; flex-wrap:wrap; gap:8px}
    .pill{
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 12.5px;
    }
    .kpi{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:10px;
    }
    @media (max-width: 640px){
      .kpi{grid-template-columns: 1fr}
    }
    .kpi .box{
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius: var(--radius2);
      padding:12px;
    }
    .kpi .box .big{font-weight:900; font-size: 16px}
    .kpi .box .small{color: var(--muted); font-size: 12.5px; margin-top:4px}
    .footer{
      margin-top: 16px;
      text-align:center;
      color: var(--muted);
      font-size: 13px;
    }

    /* Print */
    @media print{
      .topbar, .nav, .actions { display:none !important; }
      body{ background: #fff !important; color:#111 !important; }
      .card, .item, .box{ box-shadow:none !important; }
      a{ text-decoration:none !important; color:#111 !important;}
    }
  </style>
</head>

      skills: [
        { title: "Engineering", pills: ["Mechanical", "Industrial", "Methods", "Process improvement"] },
        { title: "CAD / Tools", pills: ["SolidWorks", "3D printing", "Machining center (basic)", "Office Suite"] },
        { title: "Software", pills: ["SYLOB ERP", "Python (basic)"] },

      ],

      ],

      interests: ["Aerospace", "Watchmaking", "3D printing", "Basketball", "Gym", "Video games", "Space"],

      contact: [
        { label: "Email", value: "tony.alarcon07@gmail.com", href: "mailto:tony.alarcon07@gmail.com" },
        { label: "Phone", value: "+33 6 95 22 66 53", href: "tel:+33695226653" },
        { label: "Location", value: "Lavoulte-sur-Rhône, France" },
        { label: "LinkedIn", value: "tony-alarcon-svg", href: "https://www.linkedin.com/in/tony-alarcon-svg" }
      ]
    };

    // =========================
    // Render
    // =========================
    const $ = (id) => document.getElementById(id);

    function setText(id, text){ $(id).textContent = text; }
    function el(tag, cls){ const e = document.createElement(tag); if(cls) e.className = cls; return e; }

    function render(){
      setText("topName", DATA.name);
      setText("topRole", DATA.role);
      setText("name", DATA.name);

      const initials = DATA.name.split(" ").slice(0,2).map(s => s[0]?.toUpperCase()).join("");
      $("avatar").textContent = initials || "CV";

      // top buttons
      $("btnEmail").href = `mailto:${DATA.email}`;
      $("btnLinkedIn").href = DATA.linkedin;
      $("btnCV").href = DATA.cvPdfUrl;

      // chips
      const chips = $("chips");
      chips.innerHTML = "";
      DATA.chips.forEach(c => {
        const chip = el("div","chip");
        chip.innerHTML = `<strong>${c.label}:</strong> ${c.value}`;
        chips.appendChild(chip);
      });

      // summary
      $("summary").textContent = DATA.summary;

      // KPIs
      const kpis = $("kpis");
      kpis.innerHTML = "";
      DATA.kpis.forEach(k => {
        const box = el("div","box");
        box.innerHTML = `<div class="big">${k.big}</div><div class="small">${k.small}</div>`;
        kpis.appendChild(box);
      });

      // profile blocks
      const pb = $("profileBlocks");
      pb.innerHTML = "";
      DATA.profileBlocks.forEach(b => {
        const item = el("div","item");
        const top = el("div","top");
        top.innerHTML = `<div class="title">${b.title}</div>`;
        item.appendChild(top);
        if(b.text){
          const p = el("p"); p.textContent = b.text; item.appendChild(p);
        }
        if(b.bullets?.length){
          const ul = el("ul");
          b.bullets.forEach(x => { const li=el("li"); li.textContent=x; ul.appendChild(li); });
          item.appendChild(ul);
        }
        pb.appendChild(item);
      });

      // experience
      const exp = $("experienceList"); exp.innerHTML = "";
      DATA.experience.forEach(e => exp.appendChild(renderEntry(e)));

      // projects
      const pr = $("projectsList"); pr.innerHTML = "";
      DATA.projects.forEach(p => {
        const item = el("div","item");
        item.innerHTML = `
          <div class="top">
            <div class="title">${p.title}</div>
            <div class="meta">${p.meta || ""}</div>
          </div>
          <p>${p.text || ""}</p>
        `;
        pr.appendChild(item);
      });

      // education
      const ed = $("educationList"); ed.innerHTML = "";
      DATA.education.forEach(e => ed.appendChild(renderEntry(e)));

      // skills
      const sk = $("skillsList"); sk.innerHTML = "";
      DATA.skills.forEach(s => {
        const item = el("div","item");
        item.innerHTML = `
          <div class="top">
            <div class="title">${s.title}</div>
            <div class="meta"></div>
          </div>
        `;
        const row = el("div","pillrow");
        (s.pills || []).forEach(p => {
          const pill = el("div","pill"); pill.textContent = p; row.appendChild(pill);
        });
        item.appendChild(row);
        sk.appendChild(item);
      });

      // languages
      const lg = $("languagesList"); lg.innerHTML = "";
      DATA.languages.forEach(l => lg.appendChild(renderEntry({title:l.title, meta:l.meta})));

      // interests
      const it = $("interestsList"); it.innerHTML = "";
      const item = el("div","item");
      item.innerHTML = `<div class="top"><div class="title">Interests</div><div class="meta"></div></div>`;
      const row = el("div","pillrow");
      DATA.interests.forEach(x => { const pill = el("div","pill"); pill.textContent = x; row.appendChild(pill); });
      item.appendChild(row);
      it.appendChild(item);

      // contact
      const ct = $("contactList"); ct.innerHTML = "";
      DATA.contact.forEach(c => {
        const item = el("div","item");
        const value = c.href ? `<a href="${c.href}" target="${c.href.startsWith("http") ? "_blank" : ""}" rel="noreferrer">${c.value}</a>` : c.value;
        item.innerHTML = `<div class="top"><div class="title">${c.label}</div><div class="meta">${value}</div></div>`;
        ct.appendChild(item);
      });

      // sidebar quick info
      const sb = $("sidebar"); sb.innerHTML = "";
      [
        {label:"Location", value: DATA.location},
        {label:"Email", value: DATA.email, href:`mailto:${DATA.email}`},
        {label:"Phone", value: DATA.phone, href:`tel:${DATA.phone.replace(/\s+/g,"")}`},
      ].forEach(x => {
        const item = el("div","item");
        item.innerHTML = `<div class="top"><div class="title">${x.label}</div><div class="meta">${x.href ? `<a href="${x.href}">${x.value}</a>` : x.value}</div></div>`;
        sb.appendChild(item);

      $("footer").textContent = `© ${new Date().getFullYear()} ${DATA.name} · Built with GitHub Pages (free)`;
    }

    function renderEntry(e){
      const item = el("div","item");
      item.innerHTML = `
        <div class="top">
          <div class="title">${e.title}</div>
          <div class="meta">${e.meta || ""}</div>
        </div>
        ${e.text ? `<p>${e.text}</p>` : ""}
      `;
      if(e.bullets?.length){
        const ul = el("ul");
        e.bullets.forEach(b => { const li=el("li"); li.textContent=b; ul.appendChild(li); });
        item.appendChild(ul);
      }
      return item;
    }

    // Solar tabs
    const planets = Array.from(document.querySelectorAll(".planet"));
    const panels = Array.from(document.querySelectorAll(".panel"));
    const space = $("space");
    const planetPanel = $("planetPanel");
    const planetCrumb = $("planetCrumb");
    const planetTitle = $("planetTitle");
    const planetContent = $("planetContent");
    const planetBack = $("planetBack");
    const starfield = $("starfield");
    const DEFAULT_VB = space.getAttribute("viewBox") || "-120 -120 240 240";

    function getPlanetViewBox(node){
      const box = node.getBBox();
      const centerX = box.x + box.width / 2;
      const centerY = box.y + box.height / 2;
      const minSize = 88;
      const padding = 28;
      const size = Math.max(box.width, box.height, minSize) + padding * 2;

      return `${centerX - size / 2} ${centerY - size / 2} ${size} ${size}`;
    }

    function buildStarfield(count = 280){
      if(!starfield) return;
      starfield.innerHTML = "";
      const frag = document.createDocumentFragment();

      for(let i = 0; i < count; i++){
        const star = document.createElement("span");
        star.className = Math.random() > .9 ? "star big" : "star";

        const size = (Math.random() * 2 + .5).toFixed(2);
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${(Math.random() * 100).toFixed(2)}%`;
        star.style.top = `${(Math.random() * 100).toFixed(2)}%`;
        star.style.opacity = (Math.random() * .75 + .2).toFixed(2);
        star.style.setProperty("--twinkle", `${(Math.random() * 8 + 4).toFixed(2)}s`);
        star.style.animationDelay = `${(Math.random() * 10).toFixed(2)}s`;

        frag.appendChild(star);
      }

      starfield.appendChild(frag);
    }

    function activate(id){
      planets.forEach(p => p.setAttribute("aria-selected", String(p.dataset.target === id)));
      panels.forEach(p => p.classList.toggle("active", p.id === id));
    }

    function animateViewBox(from, to, ms = 700){
      const [fx, fy, fw, fh] = from.split(" ").map(Number);
      const [tx, ty, tw, th] = to.split(" ").map(Number);
      const t0 = performance.now();

      function tick(t){
        const p = Math.min(1, (t - t0) / ms);
        const e = p < .5 ? 4*p*p*p : 1 - Math.pow(-2*p + 2, 3) / 2;

        const x = fx + (tx - fx) * e;
        const y = fy + (ty - fy) * e;
        const w = fw + (tw - fw) * e;
        const h = fh + (th - fh) * e;

        space.setAttribute("viewBox", `${x} ${y} ${w} ${h}`);
        if(p < 1) requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }

    function openPlanet(node){
      const id = node.dataset.target;
      const targetPanel = document.getElementById(id);
      if(!targetPanel) return;

      node.classList.remove("rotate");
      void node.getBoundingClientRect().width;
      node.classList.add("rotate");
      setTimeout(() => node.classList.remove("rotate"), 920);

      animateViewBox(space.getAttribute("viewBox") || DEFAULT_VB, getPlanetViewBox(node), 850);
      activate(id);

      setTimeout(() => {
        planetCrumb.textContent = "Section";
        planetTitle.textContent = node.dataset.title || id;
        planetContent.innerHTML = targetPanel.innerHTML;
        planetPanel.classList.add("open");
        history.replaceState({ section: id }, "", `#${id}`);
      }, 480);
    }

    function closePlanet(){
      planetPanel.classList.remove("open");
      animateViewBox(space.getAttribute("viewBox") || DEFAULT_VB, DEFAULT_VB, 650);
      history.replaceState({}, "", "#");
    }

    space.addEventListener("click", (e) => {
      const node = e.target.closest(".planet");
      if(node){
        openPlanet(node);
      } else if(planetPanel.classList.contains("open")){
        closePlanet();
      }
    });

    planets.forEach(node => {
      node.addEventListener("keydown", (e) => {
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          openPlanet(node);
        }
      });
    });

    planetBack.addEventListener("click", closePlanet);

    // Print
    $("btnPrint").addEventListener("click", () => window.print());

    // Init
    // always use dark theme (default colors already set in CSS)
    render();
    buildStarfield();

    let starResizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(starResizeTimer);
      starResizeTimer = setTimeout(() => buildStarfield(280), 180);
    });

    const hash = (location.hash || "").replace("#", "");
    if(hash){
      const node = planets.find(p => p.dataset.target === hash);
      if(node) openPlanet(node);
    }
  </script>
